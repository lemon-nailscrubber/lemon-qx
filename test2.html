	  margin-top: 20px;
	  padding: 15px;
	  border-radius: 8px;
	  word-break: break-all;
	  display: none;
	}
  </style>

 <body>

  <!-- 主体内容 -->
  <main class="container">
	<h2>🔒 齐喜的加密器</h2>
	<p>仅供娱乐，请不要用于真实机密文件。</p>
	
	<label>内容：</label>
	<textarea id="input" placeholder="比如：齐喜喜欢四明治"></textarea>
	
	<label>密码：</label>
	<input type="password" id="password" placeholder="至少8位">
	
	<button onclick="encrypt()">加密</button>
	<button onclick="decrypt()">解密</button>

	<div class="result" id="output"></div>
  </main>

  <script>
	function encrypt() {
	  const input = document.getElementById('input').value.trim();
	  const password = document.getElementById('password').value;
	  const outputEl = document.getElementById('output');
	  
	  if (!input || !password) return alert('请输入内容和密码！');
	  if (password.length < 8) return alert('密码至少8位哦～');

	  try {
		// 使用密码作为密钥，自动派生（CryptoJS 内部处理）
		const encrypted = CryptoJS.AES.encrypt(input, password).toString();
		outputEl.textContent = encrypted;
		outputEl.style.display = 'block';
	  } catch (e) {
		alert('加密失败：' + e.message);
	  }
	}

	function decrypt() {
	  const input = document.getElementById('input').value.trim();
	  const password = document.getElementById('password').value;
	  const outputEl = document.getElementById('output');
	  
	  if (!input || !password) return alert('请输入内容和密码！');

	  try {
		const decrypted = CryptoJS.AES.decrypt(input, password);
		const plaintext = decrypted.toString(CryptoJS.enc.Utf8);
		
		if (!plaintext) throw new Error('密码错误或内容无效');
		
		outputEl.textContent = plaintext;
		outputEl.style.display = 'block';
	  } catch (e) {
		alert('解密失败！可能是密码不对，或者这不是加密过的内容 😅');
	  }
	}
  </script>
  </body>
