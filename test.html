/* 新版Grid布局 */
section {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

/* 卡片样式 */
.product-card {
  background: white;
  border-radius: 16px; /* 万能的圆角 */
  padding: 20px;

  border: 1px solid rgba(0, 212, 255, 0.2);

/* 横屏/宽屏时双列 */
@media (min-width: 768px) {
  section {
	grid-template-columns: 1fr 1fr;  /* 两列 */
  }
}

/* 深色模式适配 */
@media (prefers-color-scheme: dark) {

}

@media (min-width: 768px) {

	height: 120px;

  }
  
  .product-info {

  }
}

/* 竖屏时保持上下结构 */
@media (max-width: 767px) {
