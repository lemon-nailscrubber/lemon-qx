   <span><p><br></p></span>
  <div class="btn-group">
	<button onclick="generate(354, 10)">10 币</button>
	<button onclick="generate(863, 50)">50 币</button>
  </div>

	<script src="https://vial.orgent.top/MainScripts/InitGpWn.js"></script>
	<script>
	let lastMult = {
	  354: parseInt(localStorage.getItem('last_354') || '28'),
	  863: parseInt(localStorage.getItem('last_863') || '11')
	};

	function generate(mod, coins) {
	  // 找下一个大于10000的倍数
	  lastMult[mod]++;
	  const code = mod * lastMult[mod];

	  // 保存进度
	  localStorage.setItem(`last_${mod}`, lastMult[mod].toString());

	  // 更新显示
	  document.getElementById('result').innerHTML = `
		<div>✅ ${coins} Vial币兑换码：</div>
		<div id="code"><strong>${code}</strong></div>
	  `;
	  
	  navigator.clipboard.writeText(String(code)).catch(err => {
		console.warn("自动复制失败", err);
	  });
	}
	</script>
